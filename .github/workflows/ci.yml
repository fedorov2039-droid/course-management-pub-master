name: CI/CD

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk
    steps:
      - uses: actions/checkout@v4
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean compile test package
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar